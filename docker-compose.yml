version: "3.8"

services:
  proxy:
    image: nginx:alpine
    container_name: ${PROXY_CONTAINER:-proxy}
    hostname: proxy
    volumes:
      - ./static:/usr/share/nginx/html:ro
    ports:
      - ${PROXY_HOST_PORT:-3006}:80

  clickhouse:
    image: betterlytics-clickhouse:dev
    build:
      context: ./clickhouse-config
      dockerfile: Dockerfile
    user: 101:101
    ports:
      - "0.0.0.0:${CLICKHOUSE_HTTP_PORT:-8123}:8123" # HTTP interface - access /play for testing
      - "0.0.0.0:${CLICKHOUSE_NATIVE_PORT:-9000}:9000" # Native interface
    container_name: ${CLICKHOUSE_CONTAINER:-clickhouse}
    hostname: clickhouse
    env_file:
      - .env
    volumes:
      - clickhouse_data:/var/lib/clickhouse/
      - clickhouse_users:/etc/clickhouse-server/users.d/
      - ./clickhouse-logs:/var/log/clickhouse-server/
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8123/ping",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:17.5
    container_name: ${POSTGRES_CONTAINER:-postgres}
    hostname: postgres
    ports:
      - ${POSTGRES_HOST_PORT:-5432}:5432
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  caddy:
    build:
      context: ./caddy
      dockerfile: Dockerfile
    container_name: ${CADDY_CONTAINER:-caddy}
    hostname: caddy
    profiles: ["status-page"]
    command: caddy run --config /etc/caddy/${CADDY_CONFIG:-Caddyfile.local} --adapter caddyfile
    ports:
      - ${STATUS_PAGE_HTTP_BIND:-127.0.0.1:8080}:80
      - ${STATUS_PAGE_HTTPS_BIND:-127.0.0.1:8443}:443
      - ${STATUS_PAGE_HTTPS_BIND:-127.0.0.1:8443}:443/udp
    environment:
      ACME_EMAIL: ${ACME_EMAIL:-dev@betterlytics.io}
      ACME_CA: ${ACME_CA:-https://acme-staging-v02.api.letsencrypt.org/directory}
      STATUS_PAGE_DOMAIN: ${STATUS_PAGE_DOMAIN:-status.localhost}
      STATUS_PAGE_UPSTREAM: ${STATUS_PAGE_UPSTREAM:-host.docker.internal:3000}
      DNS_API_TOKEN: ${DNS_API_TOKEN:-}
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - ./caddy:/etc/caddy:ro
      - caddy_data:/data
      - caddy_config:/config

  minio:
    image: minio/minio
    container_name: ${MINIO_CONTAINER:-minio}
    profiles: ["replay"]
    ports:
      - ${MINIO_API_PORT:-9001}:9001 # S3 API
      - ${MINIO_CONSOLE_PORT:-9002}:9002 # Web UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: "http://localhost:3000,http://localhost:3006,*"
    volumes:
      - minio_data:/data
    command: server /data --address ":9001" --console-address ":9002"

volumes:
  clickhouse_data:
  clickhouse_users:
  postgres_data:
  minio_data:
  caddy_data:
  caddy_config:
