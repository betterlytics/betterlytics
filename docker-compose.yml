version: "3.8"

services:
  proxy:
    image: nginx:alpine
    container_name: ${PROXY_CONTAINER:-proxy}
    hostname: proxy
    volumes:
      - ./static:/usr/share/nginx/html:ro
    ports:
      - ${PROXY_HOST_PORT:-3006}:80

  clickhouse:
    image: betterlytics-clickhouse:dev
    build:
      context: ./clickhouse-config
      dockerfile: Dockerfile
    user: 101:101
    ports:
      - "0.0.0.0:${CLICKHOUSE_HTTP_PORT:-8123}:8123" # HTTP interface - access /play for testing
      - "0.0.0.0:${CLICKHOUSE_NATIVE_PORT:-9000}:9000" # Native interface
    container_name: ${CLICKHOUSE_CONTAINER:-clickhouse}
    hostname: clickhouse
    env_file:
      - .env
    volumes:
      - clickhouse_data:/var/lib/clickhouse/
      - clickhouse_users:/etc/clickhouse-server/users.d/
      - ./clickhouse-logs:/var/log/clickhouse-server/
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8123/ping",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:17.5
    container_name: ${POSTGRES_CONTAINER:-postgres}
    hostname: postgres
    ports:
      - ${POSTGRES_HOST_PORT:-5432}:5432
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  minio:
    image: minio/minio
    container_name: ${MINIO_CONTAINER:-minio}
    profiles: ["replay"]
    ports:
      - ${MINIO_API_PORT:-9001}:9001 # S3 API
      - ${MINIO_CONSOLE_PORT:-9002}:9002 # Web UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: "http://localhost:3000,http://localhost:3006,*"
    volumes:
      - minio_data:/data
    command: server /data --address ":9001" --console-address ":9002"

volumes:
  clickhouse_data:
  clickhouse_users:
  postgres_data:
  minio_data:
